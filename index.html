<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting Zoo | ThresholdEd</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f9ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            touch-action: none;
            overflow: hidden;
        }

        .zoo-header { font-size: clamp(2rem, 8vw, 3rem); margin: 5px 0; }

        .instructions {
            background: #ffffff;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.2rem;
            width: 90%;
            max-width: 500px;
            border: 4px solid #3b82f6;
            font-weight: 700;
        }

        .card-container {
            width: 95%;
            max-width: 450px;
            aspect-ratio: 3 / 4;
            position: relative;
            background: white;
            border: 8px solid #3b82f6;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #object-area { 
            flex: 1; 
            position: relative; 
            width: 100%;
            background: #fafafa;
        }

        #trace-area {
            flex: 1.5;
            display: none; 
            position: relative;
            background: #ffffff;
            align-items: center;
            justify-content: center;
            border-top: 4px dashed #cbd5e1;
        }

        .dot {
            background-color: #3b82f6;
            border: 4px solid #1e3a8a;
            border-radius: 50%;
            position: absolute;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }
        .dot.counted { background-color: #22c55e; border-color: #14532d; }

        #trace-canvas { position: absolute; top: 0; left: 0; z-index: 25; }

        /* PEDAGOGICAL FONT: Cleanest vertical 1 and hook-free 5 */
        .trace-prompt {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 180px;
            color: rgba(0, 0, 0, 0.05);
            -webkit-text-stroke: 5px #cbd5e1;
            font-weight: 400;
            pointer-events: none;
            letter-spacing: -2px;
        }

        .btn {
            margin-top: 15px;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: 700;
            background: #2563eb;
            color: white;
            border-radius: 20px;
            border: none;
            box-shadow: 0 5px 0 #1d4ed8;
            cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="zoo-header">🦁🐯🐘🦛</div>
    <div class="instructions" id="inst">Tap the dots to count! 🦁</div>

    <div class="card-container">
        <div id="object-area"></div>
        <div id="trace-area">
            <div id="trace-template" class="trace-prompt">0</div>
            <canvas id="trace-canvas"></canvas>
        </div>
    </div>

    <button class="btn" id="checkBtn">Check ✅</button>
    <button class="btn hidden" id="nextBtn" onclick="location.reload()">Next Level ➡️</button>

    <script>
        const area = document.getElementById('object-area');
        const traceArea = document.getElementById('trace-area');
        const inst = document.getElementById('inst');
        const checkBtn = document.getElementById('checkBtn');
        const nextBtn = document.getElementById('nextBtn');
        const traceTemplate = document.getElementById('trace-template');
        const canvas = document.getElementById('trace-canvas');
        const ctx = canvas.getContext('2d');

        let count = 0;
        let isTracing = false;

        function initLevel() {
            area.innerHTML = '';
            count = Math.floor(Math.random() * 20) + 1; 
            traceTemplate.innerText = count;
            
            const dotSize = (count > 10) ? 35 : 45;

            // Phase 1: Scatter the dots
            for (let i = 0; i < count; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.width = dotSize + 'px';
                dot.style.height = dotSize + 'px';
                dot.style.left = (Math.random() * 75 + 10) + '%';
                dot.style.top = (Math.random() * 75 + 10) + '%';
                dot.onclick = () => dot.classList.toggle('counted');
                area.appendChild(dot);
            }
        }

        function rearrangeIntoGroups() {
            checkBtn.classList.add('hidden');
            inst.innerText = "Still " + count + "! Now trace it. ✍️";
            
            const dots = Array.from(document.querySelectorAll('.dot'));
            const groupSize = 5;
            const dotSize = (count > 10) ? 30 : 40;

            dots.forEach((d, i) => {
                d.style.width = dotSize + 'px';
                d.style.height = dotSize + 'px';
                
                const groupIndex = Math.floor(i / groupSize);
                const itemInGroup = i % groupSize;
                const col = itemInGroup % 3;
                const row = Math.floor(itemInGroup / 3);
                
                const xPos = (groupIndex % 2) * 50 + (col * 12) + 10;
                const yPos = Math.floor(groupIndex / 2) * 45 + (row * 12) + 15;
                
                d.style.left = xPos + '%';
                d.style.top = yPos + '%';
            });

            // Pedagogical 5-second processing pause
            setTimeout(() => {
                traceArea.style.display = 'flex';
                canvas.width = traceArea.clientWidth;
                canvas.height = traceArea.clientHeight;
                setupTracing();
                nextBtn.classList.remove('hidden');
            }, 5000);
        }

        function setupTracing() {
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };
            canvas.onmousedown = canvas.ontouchstart = (e) => { 
                e.preventDefault(); isTracing = true; ctx.beginPath(); 
                const p = getPos(e); ctx.moveTo(p.x, p.y); 
            };
            window.onmousemove = window.ontouchmove = (e) => { 
                if(!isTracing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); 
            };
            window.onmouseup = window.ontouchend = () => { isTracing = false; };
        }

        checkBtn.onclick = rearrangeIntoGroups;
        window.onload = initLevel;
    </script>
</body>
</html>
